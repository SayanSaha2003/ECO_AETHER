<!DOCTYPE html>
<html>
<head>
    <title>Company Incorporation - ECO AETHER</title>
    <link rel="stylesheet" href="CSS/dashboard.css">
</head>
<a href="dashboard.html" class="back-btn">
⬅ Back to Dashboard
</a>
<body>

<div class="main-content">

    <h1>Company Incorporation</h1>

    <p>
        Select your applicant type to view the required documents.
    </p>

    <div class="service-grid">

        <div class="service-card"
             onclick="showDocs('individual')">
            🏢 Private Limited Company
        </div>

        <div class="service-card"
             onclick="showDocs('business')">
            🤝 LLP
        </div>

    </div>

    <div id="documents"></div>

</div>

<script>

function showDocs(type){

let docs =
document.getElementById("documents");

if(type==="individual"){

docs.innerHTML=`

<h2>Required Documents</h2>

<ul>
<li>PAN Card of Directors</li>
<li>Aadhaar Card of Directors</li>
<li>Passport Size Photo</li>
<li>Address Proof</li>
<li>Email ID</li>
<li>Mobile Number</li>
</ul>

<hr>

<p>
Please send the above documents to:
<b>ecoaether998@gmail.com</b>
</p>
<p style="color:green;">
✅ Our compliance team will review your documents and contact you within 24 hours.
</p>


`;

}else{

docs.innerHTML=`

<h2>Required Documents</h2>

<ul>
<li>PAN Card</li>
<li>Aadhaar Card</li>
<li>Partner Details</li>
<li>Address Proof</li>
<li>Passport Size Photo</li>
<li>Email ID</li>
<li>Mobile Number</li>
</ul>

<hr>

<p>
Please send the above documents to:
<b>ecoaether998@gmail.com</b>
</p>
<p style="color:green;">
✅ Our compliance team will review your documents and contact you within 24 hours.
</p>

`;

}

}

</script>
<script>

if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark-mode");
}

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GST Return Filing - ECO AETHER</title>
    <link rel="stylesheet" href="CSS/dashboard.css">
</head>
<a href="dashboard.html" class="back-btn">
⬅ Back to Dashboard
</a>
<body>

<div class="main-content">

    <h1>GST Return Filing</h1>

    <p>
        Select your applicant type to view the required documents.
    </p>

    <div class="service-grid">

        <div class="service-card"
             onclick="showDocs('individual')">
            🧾 Regular Taxpayer
        </div>

        <div class="service-card"
             onclick="showDocs('business')">
            🏢 Business Entity
        </div>

    </div>

    <div id="documents"></div>

</div>

<script>

function showDocs(type){

let docs =
document.getElementById("documents");

if(type==="individual"){

docs.innerHTML=`

<h2>Required Documents</h2>

<ul>
<li>GST Certificate</li>
<li>PAN Card</li>
<li>Sales Invoices</li>
<li>Purchase Invoices</li>
<li>Bank Statement</li>
<li>Email Address</li>
<li>Mobile Number</li>
</ul>

<hr>

<p>
Please send the above documents to:
<b>ecoaether998@gmail.com</b>
</p>
<p style="color:green;">
✅ Our compliance team will review your documents and contact you within 24 hours.
</p>

`;

}else{

docs.innerHTML=`

<h2>Required Documents</h2>

<ul>
<li>GST Certificate</li>
<li>Company PAN Card</li>
<li>Sales Register</li>
<li>Purchase Register</li>
<li>Bank Statement</li>
<li>Previous GST Return Details</li>
<li>Email Address</li>
<li>Mobile Number</li>
</ul>

<hr>

<p>
Please send the above documents to:
<b>ecoaether998@gmail.com</b>
</p>
<p style="color:green;">
✅ Our compliance team will review your documents and contact you within 24 hours.
</p>

`;

}

}

</script>
<script>

if(localStorage.getItem("theme")==="dark"){
    document.body.classList.add("dark-mode");
}

</script>
</body>
</html>

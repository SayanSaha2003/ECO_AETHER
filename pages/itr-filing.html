<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>ITR Filing - ECO AETHER</title>
        <link rel="stylesheet" href="/css/dashboard.css" />
    </head>
    <body>
        <a href="dashboard.html" class="back-btn"> ⬅ Back to Dashboard </a>
        <div class="main-content">
            <h1>ITR Filing</h1>

            <p>Select your applicant type to view the required documents.</p>

            <div class="service-grid">
                <div class="service-card" onclick="showDocs('individual')">
                    👨 Salaried Employee
                </div>

                <div class="service-card" onclick="showDocs('business')">
                    💼 Business Owner
                </div>
            </div>

            <div id="documents"></div>
        </div>

        <script>
            function showDocs(type) {
                let docs = document.getElementById("documents");

                if (type === "individual") {
                    docs.innerHTML = `

<h2>Required Documents</h2>

<ul>
<li>PAN Card</li>
<li>Aadhaar Card</li>
<li>Form 16</li>
<li>Salary Slips</li>
<li>Bank Statement</li>
<li>Investment Proofs</li>
</ul>

<hr>

<p>
Please send the above documents to:
<b>ecoaether998@gmail.com</b>
</p>
<p style="color:green;">
✅ Our compliance team will review your documents and contact you within 24 hours.
</p>

`;
                } else {
                    docs.innerHTML = `

<h2>Required Documents</h2>

<ul>
<li>PAN Card</li>
<li>Aadhaar Card</li>
<li>Profit & Loss Statement</li>
<li>Bank Statement</li>
<li>GST Details</li>
<li>Business Income Records</li>
</ul>

<hr>

<p>
Please send the above documents to:
<b>ecoaether998@gmail.com</b>
</p>
<p style="color:green;">
✅ Our compliance team will review your documents and contact you within 24 hours.
</p>


`;
                }
            }
        </script>
        <script>
            if (localStorage.getItem("theme") === "dark") {
                document.body.classList.add("dark-mode");
            }
        </script>
    </body>
</html>
